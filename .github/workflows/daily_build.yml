name: Daily Football Engine Matrix Refresh

on:
  schedule:
    # Triggers every single day at 06:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows you to trigger the compilation manually with a button click

permissions:
  contents: write

jobs:
  harvest-and-compile:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code Workspace
      uses: actions/checkout@v4

    - name: Initialize Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Data Transfer Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Unified Matrix Engine
      run: python engine.py

    - name: Sync and Commit Generated Changes Back to GitHub
      run: |
        git config --global user.name "GitHub Actions Automation"
        git config --global user.email "actions@github.com"
        git add public/
        # Only commit and push if the dynamic FPL statistics actually changed
        git diff-index --quiet HEAD || git commit -m "Automated daily point matrix compilation [skip ci]"
        git push
